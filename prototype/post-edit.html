<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿を編集 — TripDiary</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
<div id="app"></div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  initData();
  if (!requireAuth()) { /* redirect */ }

  const params = new URLSearchParams(location.search);
  const postId = params.get('id');
  const post = getPostById(postId);
  const me = getCurrentUser();

  if (!post || !me || post.userId !== me.id) { location.href = 'index.html'; }

  let selectedRating = post.rating;
  let previewImages = [...post.images];
  let pinLat = post.lat || null;
  let pinLng = post.lng || null;
  let leafletMap = null;
  let leafletMarker = null;

  function setRating(val) {
    selectedRating = val;
    document.querySelectorAll('#star-input span').forEach((s, i) => {
      s.classList.toggle('active', i < val);
    });
  }

  function handleImageInput(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => { previewImages.push(ev.target.result); renderPreviews(); };
      reader.readAsDataURL(file);
    });
  }

  function removeImage(idx) { previewImages.splice(idx, 1); renderPreviews(); }

  function renderPreviews() {
    const wrap = document.getElementById('image-previews');
    wrap.innerHTML = previewImages.map((src, i) => `
      <div class="image-preview-item">
        <img src="${src}" alt="preview">
        <button class="image-preview-remove" onclick="removeImage(${i})">✕</button>
      </div>`).join('');
  }

  function initMap() {
    if (leafletMap) return;
    const center = pinLat && pinLng ? [pinLat, pinLng] : [35.6812, 139.7671];
    const zoom = pinLat && pinLng ? 13 : 5;
    leafletMap = L.map('pin-map').setView(center, zoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(leafletMap);
    if (pinLat && pinLng) {
      leafletMarker = L.marker([pinLat, pinLng]).addTo(leafletMap);
      updatePinLabel();
    }
    leafletMap.on('click', e => {
      pinLat = parseFloat(e.latlng.lat.toFixed(6));
      pinLng = parseFloat(e.latlng.lng.toFixed(6));
      if (leafletMarker) leafletMarker.setLatLng(e.latlng);
      else leafletMarker = L.marker(e.latlng).addTo(leafletMap);
      updatePinLabel();
    });
  }

  function updatePinLabel() {
    document.getElementById('pin-label').textContent = `📍 ${pinLat}, ${pinLng}`;
    document.getElementById('pin-clear').style.display = 'inline-flex';
  }

  function clearPin() {
    pinLat = null; pinLng = null;
    if (leafletMarker) { leafletMarker.remove(); leafletMarker = null; }
    document.getElementById('pin-label').textContent = '地図をクリックしてピンを設置';
    document.getElementById('pin-clear').style.display = 'none';
  }

  function updateCounter(inputId, countId) {
    const el = document.getElementById(inputId);
    const cnt = document.getElementById(countId);
    if (el && cnt) cnt.textContent = el.value.length;
  }

  function handleSubmit() {
    const title = document.getElementById('title').value.trim();
    const body = document.getElementById('body').value.trim();
    const areaTag = document.getElementById('areaTag').value.trim();
    const category = document.getElementById('category').value;
    const visitedAt = document.getElementById('visitedAt').value;

    if (!title || !body || !category || selectedRating === 0) { alert('必須項目を入力してください'); return; }

    const posts = getPosts();
    const idx = posts.findIndex(p => p.id === post.id);
    posts[idx] = { ...posts[idx], title, body, areaTag: areaTag || 'その他', category, rating: selectedRating, visitedAt, lat: pinLat, lng: pinLng, images: previewImages };
    savePosts(posts);
    showToast('更新しました！');
    setTimeout(() => location.href = `post-detail.html?id=${post.id}`, 600);
  }

  function render() {
    const hasPinInitially = !!pinLat && !!pinLng;
    const mainHtml = `
<div class="page-header"><h1 class="page-title">✏️ 投稿を編集</h1></div>
      <div class="post-form">
        <div class="form-group">
          <label class="form-label">タイトル <span style="color:var(--danger)">*</span></label>
          <input id="title" type="text" class="form-control" value="${post.title}" maxlength="40" oninput="updateCounter('title','title-count')">
          <span class="char-counter"><span id="title-count">${post.title.length}</span> / 40 文字</span>
        </div>
        <div class="form-group">
          <label class="form-label">本文 <span style="color:var(--danger)">*</span></label>
          <textarea id="body" class="form-control" rows="6">${post.body}</textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label class="form-label">カテゴリ <span style="color:var(--danger)">*</span></label>
            <select id="category" class="form-control">
              ${CATEGORIES.map(c => `<option value="${c}" ${post.category === c ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">エリアタグ</label>
            <input id="areaTag" type="text" class="form-control" value="${post.areaTag}">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label class="form-label">訪問日</label>
            <input id="visitedAt" type="date" class="form-control" value="${post.visitedAt}">
          </div>
          <div class="form-group">
            <label class="form-label">評価 <span style="color:var(--danger)">*</span></label>
            <div id="star-input" class="star-input">
              ${[1,2,3,4,5].map(i => `<span class="${i <= post.rating ? 'active' : ''}" onclick="setRating(${i})">★</span>`).join('')}
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">場所（任意）</label>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span id="pin-label" style="font-size:.85rem;color:var(--text-muted)">${hasPinInitially ? `📍 ${pinLat}, ${pinLng}` : '地図をクリックしてピンを設置'}</span>
            <button id="pin-clear" class="btn btn-ghost btn-sm" onclick="clearPin()" style="display:${hasPinInitially ? 'inline-flex' : 'none'}">✕ クリア</button>
          </div>
          <div id="pin-map" style="height:240px;border-radius:var(--radius);border:1px solid var(--border)"></div>
        </div>
        <div class="form-group">
          <label class="form-label">画像を追加</label>
          <input type="file" accept="image/*" multiple class="form-control" onchange="handleImageInput(event)">
          <div id="image-previews" class="image-preview-list"></div>
        </div>
        <button class="btn btn-primary" onclick="handleSubmit()">更新する</button>
      </div>`;

    document.getElementById('app').innerHTML = buildLayout('explore', mainHtml);
    renderPreviews();
    setTimeout(initMap, 100);
  }

  render();
</script>
</body>
</html>
