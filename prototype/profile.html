<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール — TripDiary</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app"></div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  initData();

  const params = new URLSearchParams(location.hash.slice(1));
  const userId = params.get('id');
  let targetUser = getUserById(userId);
  if (!targetUser) { location.href = 'index.html'; }

  const me = getCurrentUser();
  const initTab = params.get('tab');
  let activeTab = (initTab && initTab !== 'follow-feed') ? initTab : 'posts';

  function handleFollow() {
    if (!me) { location.href = 'login.html'; return; }
    if (me.id === targetUser.id) return;
    toggleFollow(me.id, targetUser.id);
    render();
  }

  function buildUserCard(u) {
    const following = me ? isFollowing(me.id, u.id) : false;
    return `<div class="user-item">
      <a href="profile.html#id=${u.id}"><img src="${u.avatar}" alt="${u.name}" class="avatar-sm"></a>
      <div class="user-item-info">
        <a href="profile.html#id=${u.id}" class="user-item-name">${u.name}</a>
        <p class="user-item-bio">${u.bio || ''}</p>
      </div>
      ${me && me.id !== u.id ? `<button class="btn btn-sm ${following ? 'btn-ghost' : 'btn-primary'}" onclick="handleFollowUser('${u.id}', this)">${following ? 'フォロー中' : 'フォロー'}</button>` : ''}
    </div>`;
  }

  function handleFollowUser(uid, btn) {
    if (!me) { location.href = 'login.html'; return; }
    toggleFollow(me.id, uid);
    const following = isFollowing(me.id, uid);
    btn.textContent = following ? 'フォロー中' : 'フォロー';
    btn.className = `btn btn-sm ${following ? 'btn-ghost' : 'btn-primary'}`;
    if (uid === targetUser.id) {
      document.getElementById('follower-count').textContent = getFollowerCount(targetUser.id);
    }
  }

  function setTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  }

  function render() {
    targetUser = getUserById(targetUser.id);
    const isMe = me && me.id === targetUser.id;
    const following = me && !isMe ? isFollowing(me.id, targetUser.id) : false;

    const userPosts = getPosts().filter(p => p.userId === targetUser.id)
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    const followers = getFollows()
      .filter(f => f.followingId === targetUser.id)
      .map(f => getUserById(f.followerId))
      .filter(Boolean);

    const followings = getFollows()
      .filter(f => f.followerId === targetUser.id)
      .map(f => getUserById(f.followingId))
      .filter(Boolean);

    const allComments = getComments();
    const userComments = allComments
      .filter(c => c.userId === targetUser.id)
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    const commentedPosts = userComments.map(c => ({ comment: c, post: getPostById(c.postId) })).filter(x => x.post);

    const score = calcTabiScore(targetUser.id);
    const scoreInfo = getScoreLabel(score);

    const myPostIds = isMe ? userPosts.map(p => p.id) : [];
    const receivedComments = isMe
      ? getComments().filter(c => myPostIds.includes(c.postId) && c.userId !== me.id)
          .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
          .map(c => ({ comment: c, post: getPostById(c.postId), user: getUserById(c.userId) })).filter(x => x.post && x.user)
      : [];

    const mainHtml = `
      <div class="profile-header">
        <img src="${targetUser.avatar}" alt="${targetUser.name}" class="avatar-xl">
        <div class="profile-info">
          <h1 class="profile-name">${targetUser.name}</h1>
          <div class="tabi-score-badge" style="background:${scoreInfo.color}">
            ✈️ TabiScore <strong>${score}</strong> <span class="score-label">${scoreInfo.label}</span>
          </div>
          <p class="profile-bio">${targetUser.bio || 'bioが設定されていません'}</p>
          <div class="profile-stats">
            <div class="stat-item">
              <div class="stat-num">${userPosts.length}</div>
              <div class="stat-label">投稿</div>
            </div>
            <div class="stat-item">
              <div class="stat-num" id="follower-count">${getFollowerCount(targetUser.id)}</div>
              <div class="stat-label">フォロワー</div>
            </div>
            <div class="stat-item">
              <div class="stat-num">${getFollowingCount(targetUser.id)}</div>
              <div class="stat-label">フォロー中</div>
            </div>
          </div>
          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
            ${isMe
              ? `<a href="settings.html" class="btn btn-ghost btn-sm">✏️ プロフィール編集</a>`
              : me ? `<button class="btn btn-sm ${following ? 'btn-ghost' : 'btn-primary'}" onclick="handleFollow()">${following ? 'フォロー中' : 'フォローする'}</button>` : ''
            }
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn ${activeTab==='posts'?'active':''}" data-tab="posts" onclick="setTab('posts')">投稿 (${userPosts.length})</button>
        <button class="tab-btn ${activeTab==='comments-sent'?'active':''}" data-tab="comments-sent" onclick="setTab('comments-sent')">投稿したコメント (${commentedPosts.length})</button>
        ${isMe ? `<button class="tab-btn ${activeTab==='comments-received'?'active':''}" data-tab="comments-received" onclick="setTab('comments-received')">自分へのコメント (${receivedComments.length})</button>` : ''}
        <button class="tab-btn ${activeTab==='followers'?'active':''}" data-tab="followers" onclick="setTab('followers')">フォロワー (${followers.length})</button>
        <button class="tab-btn ${activeTab==='following'?'active':''}" data-tab="following" onclick="setTab('following')">フォロー中 (${followings.length})</button>
      </div>

      <div id="tab-posts" class="tab-panel ${activeTab==='posts'?'active':''}">
        ${buildPostGrid(userPosts)}
      </div>
      <div id="tab-comments-sent" class="tab-panel ${activeTab==='comments-sent'?'active':''}">
        ${commentedPosts.length ? `<div class="comment-history-list">${commentedPosts.map(({ comment, post }) => `
          <a href="post-detail.html#id=${post.id}" class="comment-history-item">
            <div class="comment-history-thumb" style="${post.images && post.images.length ? `background-image:url('${post.images[0]}')` : 'background:#f1f5f9'}"></div>
            <div class="comment-history-body">
              <p class="comment-history-post-title">${post.title}</p>
              <p class="comment-history-text">${comment.body}</p>
              <p class="comment-history-date">${formatDate(comment.createdAt)}</p>
            </div>
          </a>`).join('')}</div>`
        : '<p class="empty-msg">まだコメントがありません</p>'}
      </div>
      ${isMe ? `
      <div id="tab-comments-received" class="tab-panel ${activeTab==='comments-received'?'active':''}">
        ${receivedComments.length ? `<div class="comment-history-list">${receivedComments.map(({ comment, post, user }) => `
          <a href="post-detail.html#id=${post.id}" class="comment-history-item">
            <img src="${user.avatar}" alt="${user.name}" class="avatar-sm" style="flex-shrink:0">
            <div class="comment-history-body">
              <p class="comment-history-post-title"><strong>${user.name}</strong> · ${post.title}</p>
              <p class="comment-history-text">${comment.body}</p>
              <p class="comment-history-date">${formatDate(comment.createdAt)}</p>
            </div>
          </a>`).join('')}</div>`
        : '<p class="empty-msg">まだコメントを受け取っていません</p>'}
      </div>` : ''}
      <div id="tab-followers" class="tab-panel ${activeTab==='followers'?'active':''}">
        ${followers.length ? `<div class="user-list">${followers.map(buildUserCard).join('')}</div>` : '<p class="empty-msg">フォロワーはまだいません</p>'}
      </div>
      <div id="tab-following" class="tab-panel ${activeTab==='following'?'active':''}">
        ${followings.length ? `<div class="user-list">${followings.map(buildUserCard).join('')}</div>` : '<p class="empty-msg">フォロー中のユーザーはいません</p>'}
      </div>`;

    document.getElementById('app').innerHTML = buildLayout('profile', mainHtml);
  }

  render();
</script>
</body>
</html>
