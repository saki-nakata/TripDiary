<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 — TripDiary</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">✈️ TripDiary</div>
    <p class="auth-subtitle">アカウントを作成して旅を記録しよう</p>
    <div id="error-msg" style="color:var(--danger);font-size:.85rem;margin-bottom:12px;display:none;"></div>
    <div class="form-group">
      <label class="form-label">名前</label>
      <input id="name" type="text" class="form-control" placeholder="例：中田 咲">
    </div>
    <div class="form-group">
      <label class="form-label">メールアドレス</label>
      <input id="email" type="email" class="form-control" placeholder="example@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">パスワード</label>
      <input id="password" type="password" class="form-control" placeholder="6文字以上">
    </div>
    <div class="form-group">
      <label class="form-label">パスワード（確認）</label>
      <input id="password-confirm" type="password" class="form-control" placeholder="もう一度入力してください">
    </div>
    <button id="signup-btn" class="btn btn-primary btn-block" onclick="handleSignup()">登録する</button>
    <p class="auth-footer">すでにアカウントをお持ちの方は <a href="login.html">ログイン</a></p>
  </div>
</div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
  initData();
  if (getCurrentUser()) window.location.href = 'index.html';

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function handleSignup() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('password-confirm').value;
    if (!name) { showError('名前を入力してください'); return; }
    if (!email) { showError('メールアドレスを入力してください'); return; }
    if (password.length < 6) { showError('パスワードは6文字以上で入力してください'); return; }
    if (password !== confirm) { showError('パスワードが一致しません'); return; }
    const btn = document.getElementById('signup-btn');
    btn.disabled = true; btn.textContent = '登録中...';
    const user = signup(name, email, password);
    if (!user) { showError('このメールアドレスはすでに使われています'); btn.disabled = false; btn.textContent = '登録する'; return; }
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
