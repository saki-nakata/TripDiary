<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検索 — TripDiary</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app"></div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  initData();

  const params = new URLSearchParams(location.search);
  let activeTab = params.get('tab') || 'spots';
  let query = '';
  let sortOrder = params.get('sort') || 'latest';
  let activeCategory = '';
  let activePrefecture = '';

  function handleFollow(uid, btn) {
    const me = getCurrentUser();
    if (!me) { location.href = 'login.html'; return; }
    toggleFollow(me.id, uid);
    const following = isFollowing(me.id, uid);
    btn.textContent = following ? 'フォロー中' : 'フォロー';
    btn.className = `btn btn-sm ${following ? 'btn-ghost' : 'btn-primary'}`;
  }

  function buildUserResults(users) {
    const me = getCurrentUser();
    if (!users.length) return '<p class="empty-msg">ユーザーが見つかりません</p>';
    return `<div class="user-list">${users.map(u => {
      const following = me ? isFollowing(me.id, u.id) : false;
      const score = calcTabiScore(u.id);
      const info = getScoreLabel(score);
      const postCount = getPosts().filter(p => p.userId === u.id).length;
      return `<div class="user-item">
        <a href="profile.html?id=${u.id}"><img src="${u.avatar}" alt="${u.name}" class="avatar"></a>
        <div class="user-item-info">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <a href="profile.html?id=${u.id}" class="user-item-name">${u.name}</a>
            <span class="score-chip" style="background:${info.color}">✈️ ${score} pts</span>
          </div>
          <p class="user-item-bio">${u.bio || ''}</p>
          <p style="font-size:.78rem;color:var(--text-muted);margin-top:2px">${postCount}件の投稿 · フォロワー ${getFollowerCount(u.id)}人</p>
        </div>
        ${me && me.id !== u.id ? `<button class="btn btn-sm ${following ? 'btn-ghost' : 'btn-primary'}" onclick="handleFollow('${u.id}', this)">${following ? 'フォロー中' : 'フォロー'}</button>` : ''}
      </div>`;
    }).join('')}</div>`;
  }

  function buildRankingList() {
    const posts = [...getPosts()].sort((a, b) => getLikeCount(b.id) - getLikeCount(a.id)).slice(0, 20);
    const rankColors = ['#f59e0b', '#9ca3af', '#b45309'];
    return `<div class="spot-ranking-list">${posts.map((p, i) => {
      const user = getUserById(p.userId);
      const thumb = p.images && p.images.length ? p.images[0] : '';
      const likes = getLikeCount(p.id);
      const color = rankColors[i] || '#6b7280';
      return `<a href="post-detail.html?id=${p.id}" class="spot-ranking-item">
        <div class="spot-rank-badge" style="background:${color}">${i + 1}</div>
        ${thumb ? `<div class="spot-rank-thumb" style="background-image:url('${thumb}')"></div>` : ''}
        <div class="spot-rank-info">
          <p class="spot-rank-title">${p.title}</p>
          <p class="spot-rank-meta">📍 ${p.areaTag} &nbsp;·&nbsp; 👍 ${likes} &nbsp;·&nbsp; ${user ? user.name : ''}</p>
        </div>
      </a>`;
    }).join('')}</div>`;
  }

  function renderResults() {
    const q = query;
    const allPosts = getPosts();
    const allUsers = getUsers();

    const filtered = allPosts.filter(p => {
      const matchQ = !q || p.title.includes(q) || p.body.includes(q) || p.areaTag.includes(q) || p.category.includes(q);
      const matchCat = !activeCategory || p.category === activeCategory;
      const matchPref = !activePrefecture || p.prefecture === activePrefecture;
      return matchQ && matchCat && matchPref;
    });

    const matchedPosts = sortOrder === 'popular'
      ? filtered.sort((a, b) => getLikeCount(b.id) - getLikeCount(a.id))
      : filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    const matchedUsers = q
      ? allUsers.filter(u => u.name.includes(q) || (u.bio || '').includes(u))
      : allUsers;

    const tabs = `
      <div class="tabs">
        <button class="tab-btn ${activeTab === 'spots' ? 'active' : ''}" onclick="setTab('spots')">旅スポット</button>
        <button class="tab-btn ${activeTab === 'area' ? 'active' : ''}" onclick="setTab('area')">エリア</button>
        <button class="tab-btn ${activeTab === 'users' ? 'active' : ''}" onclick="setTab('users')">ユーザー</button>
      </div>`;

    const commonFilters = `
      <div class="category-filter-bar">
        <button class="category-filter-btn ${activeCategory === '' ? 'active' : ''}" onclick="setCategory('')">全て</button>
        ${CATEGORIES.map(c => `<button class="category-filter-btn ${activeCategory === c ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`).join('')}
      </div>
      <div class="sort-bar">
        <button class="sort-btn ${sortOrder === 'latest' ? 'active' : ''}" onclick="setSort('latest')">新着順</button>
        <button class="sort-btn ${sortOrder === 'popular' ? 'active' : ''}" onclick="setSort('popular')">人気順</button>
      </div>`;

    const postResults = matchedPosts.length
      ? buildPostGrid(matchedPosts)
      : '<p class="empty-msg">スポットが見つかりません</p>';

    const availablePrefectures = [...new Set(allPosts.map(p => p.prefecture).filter(Boolean))];
    const prefectureGrid = `
      <div class="search-pref-grid">
        ${PREFECTURES.filter(p => availablePrefectures.includes(p)).map(p => `
          <button class="search-pref-btn ${activePrefecture === p ? 'active' : ''}" onclick="setPrefecture('${p}')">${p}</button>
        `).join('')}
      </div>
      ${activePrefecture ? `
        <p class="search-pref-selected">📍 <strong>${activePrefecture}</strong> の投稿 ${matchedPosts.length}件</p>
        ${postResults}
      ` : ''}`;

    document.getElementById('search-results').innerHTML =
      tabs +
      (activeTab !== 'users' ? commonFilters : '') +
      (activeTab === 'spots' ? postResults : '') +
      (activeTab === 'area' ? prefectureGrid : '') +
      (activeTab === 'users' ? buildUserResults(matchedUsers) : '');
  }

  function render() {
    const mainHtml = `
      <div class="page-header">
        <h1 class="page-title">🔍 検索</h1>
      </div>
      <div class="search-bar-wrap" style="margin-bottom:16px">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" class="form-control"
          placeholder="スポット名・エリア・ユーザー名で検索…"
          value="${query}"
          oninput="query=this.value;renderResults()">
      </div>
      <div id="search-results"></div>`;

    document.getElementById('app').innerHTML = buildLayout('search', mainHtml);
    renderResults();
  }

  function setTab(tab) { activeTab = tab; activePrefecture = ''; renderResults(); }
  function setSort(s) { sortOrder = s; renderResults(); }
  function setCategory(c) { activeCategory = activeCategory === c ? '' : c; renderResults(); }
  function setPrefecture(p) { activePrefecture = activePrefecture === p ? '' : p; renderResults(); }

  render();
</script>
</body>
</html>
