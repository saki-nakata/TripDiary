<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイリスト — TripDiary</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app"></div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  initData();
  if (!requireAuth()) { /* redirect */ }

  const me = getCurrentUser();
  const tabParam = new URLSearchParams(location.search).get('tab');
  let activeTab = tabParam || 'follow-feed';

  function setTab(tab) { activeTab = tab; render(); }

  function deleteMyPost(postId) {
    if (!confirm('この投稿を削除しますか？')) return;
    savePosts(getPosts().filter(p => p.id !== postId));
    showToast('投稿を削除しました');
    render();
  }

  function buildMyPostGrid(posts) {
    if (!posts.length) return '<p class="empty-msg">まだ投稿がありません</p>';
    return `<div class="post-grid">${posts.map(p => {
      const thumb = p.images && p.images.length ? p.images[0] : 'https://via.placeholder.com/400x300?text=No+Image';
      const likeCount = getLikeCount(p.id);
      const commentCount = getCommentCount(p.id);
      return `<div class="post-card mypost-card">
        <div class="post-card-image" onclick="location.href='post-detail.html?id=${p.id}'" style="cursor:pointer">
          <img src="${thumb}" alt="${p.title}" loading="lazy">
          ${categoryBadge(p.category)}
          <div class="mypost-actions">
            <a href="post-edit.html?id=${p.id}" class="mypost-action-btn" title="編集" onclick="event.stopPropagation()">✏️</a>
            <button class="mypost-action-btn mypost-delete-btn" title="削除" onclick="event.stopPropagation();deleteMyPost('${p.id}')">🗑️</button>
          </div>
        </div>
        <div class="post-card-body" onclick="location.href='post-detail.html?id=${p.id}'" style="cursor:pointer">
          <h3 class="post-card-title">${p.title}</h3>
          <div class="post-card-meta">
            <span class="area-tag">📍 ${p.areaTag}</span>
          </div>
          <div class="post-card-footer">
            <span>👍 ${likeCount}</span>
            <span>💬 ${commentCount}</span>
            <span class="post-card-date">${formatDate(p.createdAt)}</span>
          </div>
          ${p.cost != null ? `<div class="mypost-cost">💴 ${p.cost.toLocaleString()}円${Array.isArray(p.costBreakdown) && p.costBreakdown.length ? `<span class="mypost-cost-breakdown">${p.costBreakdown.map(it => `<span>${it.label} ${Number(it.amount).toLocaleString()}円</span>`).join('')}</span>` : ''}</div>` : ''}
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function buildPlanCard(p) {
    const dateRange = p.startDate
      ? `${formatDate(p.startDate)}${p.endDate ? ' 〜 ' + formatDate(p.endDate) : ''}`
      : '日程未定';
    return `<a href="plan-detail.html?id=${p.id}" class="plan-card ${p.completed ? 'plan-card-completed' : ''}">
      <div class="plan-card-header">
        <h3 class="plan-card-title">🗺️ ${p.title}</h3>
        <span class="plan-card-count">${p.spotIds.length}スポット</span>
      </div>
      <p class="plan-card-date">📅 ${dateRange}</p>
      ${p.memo ? `<p class="plan-card-memo">${p.memo}</p>` : ''}
    </a>`;
  }

  function buildPlanTab() {
    const all = getPlans().filter(p => p.userId === me.id).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    const active = all.filter(p => !p.completed);
    const completed = all.filter(p => p.completed);
    if (!all.length) return `<div class="empty-msg" style="padding:48px 0">
      <p style="font-size:2rem;margin-bottom:12px">🗺️</p>
      <p>まだ旅行プランがありません</p>
      <a href="plan-new.html" class="btn btn-primary" style="margin-top:16px">最初のプランを作成する</a>
    </div>`;
    return `
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
        <a href="plan-new.html" class="btn btn-primary btn-sm">＋ 新しいプランを作成</a>
      </div>
      ${active.length ? `<div class="plan-list">${active.map(buildPlanCard).join('')}</div>` : ''}
      ${completed.length ? `
        <div class="plan-completed-section">
          <button class="picker-others-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.classList.toggle('open')">
            ✅ 完了した旅行（${completed.length}件）<span class="picker-toggle-arrow">▼</span>
          </button>
          <div class="picker-others-list">
            <div class="plan-list" style="margin-top:12px">${completed.map(buildPlanCard).join('')}</div>
          </div>
        </div>` : ''}`;
  }

  function render() {
    const myPosts = getPosts().filter(p => p.userId === me.id);
    const wishlistPostIds = getWishlists().filter(w => w.userId === me.id).map(w => w.postId);
    const wishlistPosts = getPosts().filter(p => wishlistPostIds.includes(p.id));
    const visitedPostIds = getVisited().filter(v => v.userId === me.id).map(v => v.postId);
    const visitedPosts = getPosts().filter(p => visitedPostIds.includes(p.id));
    const followingIds = getFollows().filter(f => f.followerId === me.id).map(f => f.followingId);
    const followPosts = getPosts().filter(p => followingIds.includes(p.userId)).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    const followFeedCount = followPosts.length;
    const titles = {
      'follow-feed': `👥 フォロー中の投稿 <span class="page-count">${followFeedCount}</span>`,
      wishlist: `🔖 行きたい <span class="page-count">${wishlistPosts.length}</span>`,
      visited: `✅ 訪問済み <span class="page-count">${visitedPosts.length}</span>`,
      myposts: `✈️ 自分の投稿 <span class="page-count">${myPosts.length}</span>`,
      plans: `🗺️ 旅行プラン <span class="page-count">${getPlans().filter(p => p.userId === me.id && !p.completed).length}</span>`,
    };
    const mainHtml = `
      <div class="page-header" style="display:flex;align-items:center;gap:16px">
        <h1 class="page-title">${titles[activeTab] || ''}</h1>
        <div class="mypage-banner">🔒 この画面は自分のみ表示</div>
      </div>

      ${activeTab === 'follow-feed'
        ? (followPosts.length ? buildPostGrid(followPosts) : `<div class="empty-msg" style="padding:48px 0"><p style="font-size:2rem;margin-bottom:12px">👥</p><p>フォロー中のユーザーがいません</p><a href="search.html" class="btn btn-primary" style="margin-top:16px">ユーザーを探す</a></div>`)
        : activeTab === 'wishlist'
        ? (wishlistPosts.length ? buildPostGrid(wishlistPosts) : `<div class="empty-msg" style="padding:48px 0"><p style="font-size:2rem;margin-bottom:12px">🔖</p><p>行きたいリストがまだありません</p><a href="index.html" class="btn btn-primary" style="margin-top:16px">スポットを探す</a></div>`)
        : activeTab === 'visited'
        ? (visitedPosts.length ? buildPostGrid(visitedPosts) : `<div class="empty-msg" style="padding:48px 0"><p style="font-size:2rem;margin-bottom:12px">✅</p><p>訪問済みのスポットがありません</p></div>`)
        : activeTab === 'myposts'
        ? buildMyPostGrid(myPosts)
        : buildPlanTab()}`;

    document.getElementById('app').innerHTML = buildLayout('mypage', mainHtml);
  }

  render();
</script>
</body>
</html>
