<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ — TripDiary</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app"></div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  initData();
  if (!requireAuth()) { /* redirect */ }

  const me = getCurrentUser();
  let activeTab = 'posts';

  function setTab(tab) { activeTab = tab; render(); }

  function buildActivityItem(act) {
    const user = getUserById(act.userId);
    const thumb = act.post && act.post.images && act.post.images.length ? act.post.images[0] : null;
    let label = '', link = '';
    if (act.type === 'post') {
      label = `<strong>${user.name}</strong> が旅スポットを投稿しました`;
      link = `post-detail.html?id=${act.post.id}`;
    } else if (act.type === 'like') {
      label = `<strong>${user.name}</strong> が <em>${act.post.title}</em> にいいね！しました`;
      link = `post-detail.html?id=${act.post.id}`;
    } else if (act.type === 'comment') {
      label = `<strong>${user.name}</strong> が <em>${act.post.title}</em> にコメントしました`;
      link = `post-detail.html?id=${act.post.id}`;
    } else if (act.type === 'follow') {
      const target = getUserById(act.targetId);
      label = `<strong>${user.name}</strong> が <strong>${target ? target.name : ''}</strong> をフォローしました`;
      link = `profile.html?id=${act.userId}`;
    }
    const typeIcon = { post: '✈️', like: '👍', comment: '💬', follow: '👤' }[act.type];
    return `<div class="activity-item" onclick="location.href='${link}'">
      <div class="activity-icon">${typeIcon}</div>
      <a href="profile.html?id=${user.id}" onclick="event.stopPropagation()">
        <img src="${user.avatar}" alt="${user.name}" class="avatar-sm">
      </a>
      <div class="activity-body">
        <p class="activity-label">${label}</p>
        <span class="activity-time">${formatDate(act.date)}</span>
        ${thumb ? `<a href="${link}" onclick="event.stopPropagation()"><img src="${thumb}" alt="" class="activity-thumb"></a>` : ''}
        ${act.type === 'comment' ? `<p class="activity-comment-text">${act.comment.body}</p>` : ''}
      </div>
    </div>`;
  }

  function deleteMyPost(postId) {
    if (!confirm('この投稿を削除しますか？')) return;
    const posts = getPosts().filter(p => p.id !== postId);
    savePosts(posts);
    showToast('投稿を削除しました');
    render();
  }

  function buildMyPostGrid(posts) {
    if (!posts.length) return '<p class="empty-msg">まだ投稿がありません</p>';
    return `<div class="post-grid">${posts.map(p => {
      const thumb = p.images && p.images.length ? p.images[0] : 'https://via.placeholder.com/400x300?text=No+Image';
      const likeCount = getLikeCount(p.id);
      const commentCount = getCommentCount(p.id);
      return `<div class="post-card mypost-card">
        <div class="post-card-image" onclick="location.href='post-detail.html?id=${p.id}'" style="cursor:pointer">
          <img src="${thumb}" alt="${p.title}" loading="lazy">
          ${categoryBadge(p.category)}
          <div class="mypost-actions">
            <a href="post-edit.html?id=${p.id}" class="mypost-action-btn" title="編集" onclick="event.stopPropagation()">✏️</a>
            <button class="mypost-action-btn mypost-delete-btn" title="削除" onclick="event.stopPropagation();deleteMyPost('${p.id}')">🗑️</button>
          </div>
        </div>
        <div class="post-card-body" onclick="location.href='post-detail.html?id=${p.id}'" style="cursor:pointer">
          <h3 class="post-card-title">${p.title}</h3>
          <div class="post-card-meta">
            <span class="area-tag">📍 ${p.areaTag}</span>
          </div>
          <div class="post-card-footer">
            <span>👍 ${likeCount}</span>
            <span>💬 ${commentCount}</span>
            <span class="post-card-date">${formatDate(p.createdAt)}</span>
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function render() {
    const score = calcTabiScore(me.id);
    const scoreInfo = getScoreLabel(score);
    const myPosts = getPosts().filter(p => p.userId === me.id);
    const followingIds = getFollows().filter(f => f.followerId === me.id).map(f => f.followingId);
    const activities = getFollowActivities(me.id);
    const followPosts = getPosts()
      .filter(p => followingIds.includes(p.userId))
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    const wishlistPostIds = getWishlists().filter(w => w.userId === me.id).map(w => w.postId);
    const wishlistPosts = getPosts().filter(p => wishlistPostIds.includes(p.id));
    const visitedPostIds = getVisited().filter(v => v.userId === me.id).map(v => v.postId);
    const visitedPosts = getPosts().filter(p => visitedPostIds.includes(p.id));

    const emptyFollow = `<div class="empty-msg" style="padding:48px 0">
      <p style="font-size:2rem;margin-bottom:12px">👥</p>
      <p>フォロー中のユーザーがいません</p>
      <a href="search.html" class="btn btn-primary" style="margin-top:16px">ユーザーを探す</a>
    </div>`;
    const emptyWishlist = `<div class="empty-msg" style="padding:48px 0">
      <p style="font-size:2rem;margin-bottom:12px">🔖</p>
      <p>行きたいリストがまだありません</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:16px">スポットを探す</a>
    </div>`;

    const mainHtml = `
      <div class="mypage-banner">
        <div class="mypage-banner-left">🔒 <strong>管理画面</strong> — この画面はあなただけに見えます</div>
        <a href="profile.html?id=${me.id}" class="mypage-banner-link">🌐 公開プロフィールを見る</a>
      </div>

      <div class="mypage-header">
        <img src="${me.avatar}" alt="${me.name}" class="avatar-lg">
        <div class="mypage-info">
          <h1 class="mypage-name">${me.name}</h1>
          <div class="tabi-score-badge" style="background:${scoreInfo.color}">
            ✈️ TabiScore <strong>${score}</strong> <span class="score-label">${scoreInfo.label}</span>
          </div>
          <div class="mypage-stats">
            <div class="stat-item">
              <div class="stat-num">${myPosts.length}</div>
              <div class="stat-label">投稿</div>
            </div>
            <div class="stat-item">
              <div class="stat-num">${getFollowerCount(me.id)}</div>
              <div class="stat-label">フォロワー</div>
            </div>
            <div class="stat-item">
              <div class="stat-num">${getFollowingCount(me.id)}</div>
              <div class="stat-label">フォロー中</div>
            </div>
            <div class="stat-item">
              <div class="stat-num">${wishlistPostIds.length}</div>
              <div class="stat-label">行きたい</div>
            </div>
            <div class="stat-item">
              <div class="stat-num">${visitedPostIds.length}</div>
              <div class="stat-label">訪問済み</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
            <a href="settings.html" class="btn btn-ghost btn-sm">✏️ プロフィール編集</a>
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn ${activeTab === 'posts' ? 'active' : ''}" onclick="setTab('posts')">フォロー中の投稿</button>
        <button class="tab-btn ${activeTab === 'wishlist' ? 'active' : ''}" onclick="setTab('wishlist')">🔖 行きたい</button>
        <button class="tab-btn ${activeTab === 'visited' ? 'active' : ''}" onclick="setTab('visited')">✅ 訪問済み</button>
        <button class="tab-btn ${activeTab === 'myposts' ? 'active' : ''}" onclick="setTab('myposts')">✈️ 自分の投稿</button>
      </div>

      ${activeTab === 'posts'
        ? (followPosts.length ? buildPostGrid(followPosts) : emptyFollow)
        : activeTab === 'wishlist'
        ? (wishlistPosts.length ? buildPostGrid(wishlistPosts) : emptyWishlist)
        : activeTab === 'visited'
        ? (visitedPosts.length ? buildPostGrid(visitedPosts) : '<div class="empty-msg" style="padding:48px 0"><p style="font-size:2rem;margin-bottom:12px">✅</p><p>訪問済みのスポットがありません</p></div>')
        : buildMyPostGrid(myPosts)}`;

    document.getElementById('app').innerHTML = buildLayout('mypage', mainHtml);
  }

  render();
</script>
</body>
</html>
