services:
  db:
    image: mysql:8.0
    container_name: tripdiary-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tripdiary
      MYSQL_USER: tripdiary
      MYSQL_PASSWORD: tripdiary
    ports:
      - "3306:3306"
    volumes:
      - tripdiary-db-data:/var/lib/mysql

  mysql-test:
    image: mysql:8.0
    container_name: tripdiary-db-test
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tripdiary_test
      MYSQL_USER: tripdiary
      MYSQL_PASSWORD: tripdiary
    ports:
      - "3307:3306"
    tmpfs:
      - /var/lib/mysql

  mysql-perf:
    image: mysql:8.0
    container_name: tripdiary-db-perf
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tripdiary_perf
      MYSQL_USER: tripdiary
      MYSQL_PASSWORD: tripdiary
    ports:
      - "3308:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tripdiary-db-data:
